<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Sketchfab - Viste Personalizzate e Cattura</title>
    
    <script type="text/javascript" src="https://static.sketchfab.com/api/sketchfab-viewer-1.12.1.js"></script>
    
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #2c2c2c; 
            height: 100vh; 
            overflow: hidden;
        }
        
        #viewer-container { 
            position: relative; 
            width: 100%; 
            height: 100%; 
        }
        
        #api-frame { 
            width: 100%; 
            height: 100%; 
            border: none; 
        }

        /* --- MENU DELLE VISTE (In basso) --- */
        #menu-viste {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 1000;
        }

        .btn-vista {
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-vista:hover {
            background-color: #1caad9; 
            border-color: #1caad9;
        }

        /* --- PANNELLO STRUMENTI (In alto a destra) --- */
        #pannello-strumenti {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background-color: rgba(0, 0, 0, 0.85);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #444;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: flex-end;
        }

        #btn-cattura {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        #btn-cattura:hover {
            background-color: #c0392b;
        }

        #output-coordinate {
            width: 320px;
            height: 50px;
            background-color: #111;
            color: #0f0; /* Verde in stile codice */
            border: 1px solid #555;
            border-radius: 4px;
            padding: 5px;
            font-family: monospace;
            font-size: 13px;
            resize: none;
            display: none; /* Nasconde la casella finché non clicchi */
        }
    </style>
</head>
<body>

    <div id="viewer-container">
        <iframe src="" id="api-frame" allow="autoplay; fullscreen; vr" allowvr allowfullscreen mozallowfullscreen="true" webkitallowfullscreen="true"></iframe>
        
        <div id="menu-viste">
            <button class="btn-vista" id="btn-1">Vista 1</button>
            <button class="btn-vista" id="btn-2">Vista 2</button>
            <button class="btn-vista" id="btn-3">Vista 3</button>
            <button class="btn-vista" id="btn-4">Vista 4</button>
        </div>

        <div id="pannello-strumenti">
            <button id="btn-cattura">📸 Cattura Coordinate</button>
            <textarea id="output-coordinate" readonly></textarea>
        </div>
    </div>

    <script type="text/javascript">
        var modelUid = '63418af586f14584ab947ca56c9f1a8c'; 
        var iframe = document.getElementById('api-frame');
        var client = new window.Sketchfab('1.12.1', iframe);
        var api = null;

        // ==========================================
        // 1. INCOLLA QUI LE VISTE CHE CATTURI
        // ==========================================
        var viste = {
            vista1: { eye: [52.924, 31.105, 56.778], target: [52.934, 31.958, 2.501] },
            vista2: { eye: [50.366, -35.912, 55.727], target: [50.366, -35.059, 1.449] },
            vista3: { eye: [-50.006, -36.387, 80.446], target: [-49.978, -35.147, 1.517] },
            vista4: { eye: [-52.306, 33.341, 81.538], target: [-52.269, 34.580, 2.609] }
        };

        client.init(modelUid, {
            success: function success(sketchfabApi) {
                api = sketchfabApi;
                api.start();
                
                api.addEventListener('viewerready', function() {
                    
                    // Collega i bottoni alle coordinate
                    document.getElementById('btn-1').addEventListener('click', function() {
                        api.setCameraLookAt(viste.vista1.eye, viste.vista1.target, 1.5);
                    });

                    document.getElementById('btn-2').addEventListener('click', function() {
                        api.setCameraLookAt(viste.vista2.eye, viste.vista2.target, 1.5);
                    });

                    document.getElementById('btn-3').addEventListener('click', function() {
                        api.setCameraLookAt(viste.vista3.eye, viste.vista3.target, 1.5);
                    });

                    document.getElementById('btn-4').addEventListener('click', function() {
                        api.setCameraLookAt(viste.vista4.eye, viste.vista4.target, 1.5);
                    });
                });
            },
            error: function error() { console.error('Errore nel caricamento del modello.'); },
            ui_annotations: 0, // Puoi mettere a 1 se ti servono le note native
            ui_infos: 0
        });

        // ==========================================
        // 2. IL BOTTONE DI CATTURA (Funzionante al 100%)
        // ==========================================
        document.getElementById('btn-cattura').addEventListener('click', function() {
            if (api) {
                api.getCameraLookAt(function(err, camera) {
                    if (!err) {
                        // Genera il codice esatto
                        var codice = '{ eye: [' + camera.position.map(n => n.toFixed(3)).join(', ') + '], target: [' + camera.target.map(n => n.toFixed(3)).join(', ') + '] }';
                        
                        // Lo stampa anche nella Console per sicurezza
                        console.log("Copia questa riga per la tua vista:");
                        console.log(codice);
                        
                        // Mostra la casella di testo su schermo
                        var textBox = document.getElementById('output-coordinate');
                        textBox.style.display = 'block';
                        
                        // Inserisce il codice e lo seleziona in automatico
                        textBox.value = codice;
                        textBox.select();
                    }
                });
            }
        });
    </script>
</body>
</html>
