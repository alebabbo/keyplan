<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Sketchfab - Etichette Personalizzate</title>
    
    <script type="text/javascript" src="https://static.sketchfab.com/api/sketchfab-viewer-1.12.1.js"></script>
    
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #2c2c2c; 
            height: 100vh; 
            overflow: hidden;
        }
        
        #viewer-container { 
            position: relative; 
            width: 100%; 
            height: 100%; 
        }
        
        #api-frame { 
            width: 100%; 
            height: 100%; 
            border: none; 
        }

        /* --- STILE DELLE ETICHETTE --- */
        .etichetta-titolo {
            position: absolute;
            z-index: 1000; /* Assicura che stiano SOPRA l'iframe 3D */
            top: -100px; left: -100px; 
            
            background-color: rgba(0, 0, 0, 0.75);
            color: #ffffff;
            padding: 8px 16px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.4);
            
            transform: translate(-50%, -50%);
            transition: background-color 0.2s, transform 0.2s;
            cursor: pointer;
            pointer-events: auto;
        }

        .etichetta-titolo:hover { 
            background-color: rgba(28, 170, 217, 0.95); 
            transform: translate(-50%, -50%) scale(1.05);
        }
    </style>
</head>
<body>

    <div id="viewer-container">
        <iframe src="" id="api-frame" allow="autoplay; fullscreen; vr" allowvr allowfullscreen mozallowfullscreen="true" webkitallowfullscreen="true"></iframe>
    </div>

    <script type="text/javascript">
        var modelUid = '63418af586f14584ab947ca56c9f1a8c'; 
        var iframe = document.getElementById('api-frame');
        var client = new window.Sketchfab('1.12.1', iframe);
        var api = null;
        var etichetteGenerate = [];

        client.init(modelUid, {
            success: function success(sketchfabApi) {
                api = sketchfabApi;
                api.start();
                
                api.addEventListener('viewerready', function() {
                    console.log('Modello pronto. Nascondo i pallini nativi...');
                    
                    // 1. Pixel PNG invisibile per nascondere i numeri
                    var pngTrasparente = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=';
                    api.setAnnotationsTexture(pngTrasparente);
                    
                    // 2. Aspettiamo mezzo secondo per sicurezza, poi generiamo le etichette
                    setTimeout(creaEtichette, 500);
                });
            },
            error: function error() { console.error('Errore nel caricamento del modello.'); },
            ui_annotations: 1, // Fondamentale per far aprire i fumetti
            ui_infos: 0
        });

        // ==========================================
        // CREAZIONE DELLE ETICHETTE DA SKETCHFAB
        // ==========================================
        function creaEtichette() {
            var container = document.getElementById('viewer-container');
            console.log('Leggo le annotazioni...');

            api.getAnnotationList(function(err, annotations) {
                if (err) {
                    console.error('Errore lettura annotazioni', err);
                    return;
                }

                annotations.forEach(function(nota, index) {
                    // Crea l'elemento HTML visivo
                    var divEtichetta = document.createElement('div');
                    divEtichetta.className = 'etichetta-titolo';
                    divEtichetta.innerText = nota.name; 
                    
                    container.appendChild(divEtichetta);

                    // Apre l'annotazione al clic
                    divEtichetta.addEventListener('click', function() {
                        api.gotoAnnotation(index);
                    });

                    // Salva i dati per il tracciamento
                    etichetteGenerate.push({
                        elementoDOM: divEtichetta,
                        coord3D: nota.target 
                    });
                });

                console.log('Etichette create! Avvio il tracciamento.');
                avviaInseguimento();
            });
        }

        // ==========================================
        // TRACCIAMENTO TELECAMERA (IL MOTORE CORRETTO)
        // ==========================================
        function avviaInseguimento() {
            
            function aggiornaPosizioni() {
                etichetteGenerate.forEach(function(dati) {
                    
                    // La funzione esatta per trasformare le coordinate 3D in coordinate dello schermo
                    api.getWorldToScreenCoordinates(dati.coord3D, function(risultato) {
                        
                        if (risultato && risultato.canvasCoord) {
                            var x = risultato.canvasCoord[0];
                            var y = risultato.canvasCoord[1];
                            
                            // Applica i pixel al CSS dell'elemento
                            dati.elementoDOM.style.left = x + 'px';
                            dati.elementoDOM.style.top = y + 'px';
                            
                            // Gestione della visibilità (nasconde se fuori inquadratura o dietro la telecamera)
                            if (x < -1000 || y < -1000) {
                                dati.elementoDOM.style.opacity = '0';
                                dati.elementoDOM.style.pointerEvents = 'none';
                            } else {
                                dati.elementoDOM.style.opacity = '1';
                                dati.elementoDOM.style.pointerEvents = 'auto';
                            }
                        }
                    });
                });
            }

            // Forza il primo posizionamento immediato
            aggiornaPosizioni();

            // Continua ad aggiornare durante i movimenti di camera
            api.addEventListener('cameramove', aggiornaPosizioni);
        }
    </script>
</body>
</html>
