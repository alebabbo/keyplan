<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Sketchfab - Pivot Corretto</title>
    
    <script type="text/javascript" src="https://static.sketchfab.com/api/sketchfab-viewer-1.12.1.js"></script>
    
    <style>
        body { margin: 0; padding: 0; background-color: #2c2c2c; height: 100vh; }
        #api-frame { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <iframe src="" id="api-frame" allow="autoplay; fullscreen; vr" allowvr allowfullscreen mozallowfullscreen="true" webkitallowfullscreen="true"></iframe>

    <script type="text/javascript">
        var modelUid = '63418af586f14584ab947ca56c9f1a8c'; 
        var iframe = document.getElementById('api-frame');
        var client = new window.Sketchfab('1.12.1', iframe);
        var api = null;

        // ==========================================
        // 1. LA TUA LISTA DEI PIVOT CORRETTI
        // ==========================================
        // L'ordine deve essere esatto: la prima riga è per l'annotazione 1, la seconda per la 2, ecc.
        var coordinateCorrette = [
            { eye: [5.000, 5.000, 5.000], target: [0.000, 0.000, 0.000] }, // Annotazione 1 (01)
            { eye: [5.000, 5.000, 5.000], target: [0.000, 0.000, 0.000] }, // Annotazione 2 (ale)
            { eye: [5.000, 5.000, 5.000], target: [0.000, 0.000, 0.000] }  // Annotazione 3 (zzz)
        ];

        client.init(modelUid, {
            success: function success(sketchfabApi) {
                api = sketchfabApi;
                api.start();
                
                api.addEventListener('viewerready', function() {
                    console.log('Modello pronto. Attivo il bypass del pivot!');

                    // ==========================================
                    // 2. IL DIROTTATORE DI TELECAMERA
                    // ==========================================
                    api.addEventListener('annotationSelect', function(index) {
                        // Se index è -1 significa che l'utente ha cliccato fuori chiudendo l'annotazione
                        if (index === -1) return; 

                        // Controlliamo se hai inserito le coordinate per questa nota
                        if (coordinateCorrette[index]) {
                            var vista = coordinateCorrette[index];
                            
                            // Usiamo un ritardo di un decimo di secondo (100ms) per far partire
                            // il nostro comando DOPO quello nativo di Sketchfab, sovrascrivendolo.
                            setTimeout(function() {
                                api.setCameraLookAt(vista.eye, vista.target, 1.5);
                            }, 100);
                        }
                    });
                });
            },
            error: function error() { console.error('Errore nel caricamento.'); },
            // Manteniamo TUTTA la grafica originale nativa accesa!
            ui_annotations: 1, 
            ui_infos: 0
        });

        // ==========================================
        // 3. LO STRUMENTO SEGRETO PER TROVARE LE COORDINATE
        // ==========================================
        // Premi il tasto 'C' sulla tastiera per copiare le coordinate attuali!
        window.addEventListener('keydown', function(event) {
            if (event.key === 'c' || event.key === 'C') {
                if (api) {
                    api.getCameraLookAt(function(err, camera) {
                        if (!err) {
                            var codice = '{ eye: [' + camera.position.map(n => n.toFixed(3)).join(', ') + '], target: [' + camera.target.map(n => n.toFixed(3)).join(', ') + '] },';
                            console.log("Copia questa riga:");
                            console.log(codice);
                            alert("Coordinate stampate nella Console (F12)!");
                        }
                    });
                }
            }
        });
    </script>
</body>
</html>
