<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizzatore Sketchfab Personalizzato</title>
    
    <script type="text/javascript" src="https://static.sketchfab.com/api/sketchfab-viewer-1.12.1.js"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-color: #2c2c2c;
            color: white;
        }
        /* Contenitore per il modello 3D */
        #api-frame {
            width: 100%;
            height: 80vh;
            border: none;
        }
        /* Stile della barra dei pulsanti */
        .controls {
            padding: 20px;
            display: flex;
            gap: 15px;
            justify-content: center;
            background-color: #1a1a1a;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #1caad9;
            color: white;
            font-weight: bold;
        }
        button:hover {
            background-color: #1588af;
        }
        #btn-log {
            background-color: #d97b1c;
        }
    </style>
</head>
<body>

    <iframe src="" id="api-frame" allow="autoplay; fullscreen; vr" allowvr allowfullscreen mozallowfullscreen="true" webkitallowfullscreen="true"></iframe>

    <div class="controls">
        <button id="btn-vista1">Dettaglio 1</button>
        <button id="btn-vista2">Dettaglio 2</button>
        <button id="btn-vista3">Vista Globale</button>
        <button id="btn-log">Stampa Coordinate (F12)</button>
    </div>

    <script type="text/javascript">
        // 1. INSERISCI QUI L'ID DEL TUO MODELLO
        // Lo trovi nell'URL del modello (es: sketchfab.com/3d-models/nome-modello-123456789abcdef...), copia solo la stringa alfanumerica
        var modelUid = '63418af586f14584ab947ca56c9f1a8c'; 

        var iframe = document.getElementById('api-frame');
        var client = new window.Sketchfab(1.12.1, iframe);
        var api = null;

        // Inizializza il visualizzatore
        client.init(modelUid, {
            success: function success(sketchfabApi) {
                api = sketchfabApi;
                api.start();
                
                api.addEventListener('viewerready', function() {
                    console.log('Modello caricato e pronto!');
                    setupButtons();
                });
            },
            error: function error() {
                console.error('Errore nel caricamento del modello.');
            },
            
            // Opzioni di visualizzazione (nasconde la UI standard di Sketchfab per un look più pulito)
            ui_annotations: 0,
            ui_infos: 0,
            ui_watermark: 0
        });

        // Funzione per gestire i clic sui pulsanti
        function setupButtons() {
            
            // Dettaglio 1
            document.getElementById('btn-vista1').addEventListener('click', function() {
                // api.setCameraLookAt([Posizione Telecamera X, Y, Z], [Punto di Rotazione/Target X, Y, Z], durata transizione in secondi)
                api.setCameraLookAt([-5.0, 2.0, 3.0], [0.0, 0.0, 0.0], 2.0);
            });

            // Dettaglio 2
            document.getElementById('btn-vista2').addEventListener('click', function() {
                api.setCameraLookAt([2.5, -4.0, 1.5], [1.0, -0.5, 0.5], 2.0);
            });

            // Vista Globale
            document.getElementById('btn-vista3').addEventListener('click', function() {
                api.setCameraLookAt([10.0, 10.0, 10.0], [0.0, 0.0, 0.0], 3.0);
            });

            // --- TRUCCO PER TROVARE LE COORDINATE ---
            document.getElementById('btn-log').addEventListener('click', function() {
                api.getCameraLookAt(function(err, camera) {
                    if (!err) {
                        console.log('Copia questi valori:');
                        console.log('Telecamera (Eye): [' + camera.position.map(n => n.toFixed(3)).join(', ') + ']');
                        console.log('Centro di rotazione (Target): [' + camera.target.map(n => n.toFixed(3)).join(', ') + ']');
                        alert("Coordinate stampate nella Console per Sviluppatori! (Premi F12 per aprirla)");
                    }
                });
            });
        }
    </script>
</body>
</html>
