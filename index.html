<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Etichette Automatiche Sketchfab</title>
    
    <script type="text/javascript" src="https://static.sketchfab.com/api/sketchfab-viewer-1.12.1.js"></script>
    
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background-color: #2c2c2c; }
        #viewer-container { position: relative; width: 100%; height: 100vh; overflow: hidden; }
        #api-frame { width: 100%; height: 100%; border: none; }

        /* Stile delle etichette che verranno generate dinamicamente */
        .etichetta-fluttuante {
            position: absolute;
            top: -100px; left: -100px;
            background-color: rgba(28, 170, 217, 0.9);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
            transform: translate(-50%, -50%);
            transition: opacity 0.2s ease-out;
            cursor: pointer;
            pointer-events: auto;
            white-space: nowrap; /* Evita che il testo vada a capo se troppo lungo */
        }
        .etichetta-fluttuante:hover { background-color: rgba(21, 136, 175, 1); }
    </style>
</head>
<body>

    <div id="viewer-container">
        <iframe src="" id="api-frame" allow="autoplay; fullscreen; vr" allowvr allowfullscreen mozallowfullscreen="true" webkitallowfullscreen="true"></iframe>
    </div>

    <script type="text/javascript">
        var modelUid = '63418af586f14584ab947ca56c9f1a8c'; 
        var iframe = document.getElementById('api-frame');
        var client = new window.Sketchfab('1.12.1', iframe);
        var api = null;

        // Questo array si riempirà automaticamente
        var etichetteGenerate = [];

        client.init(modelUid, {
            success: function success(sketchfabApi) {
                api = sketchfabApi;
                api.start();
                
                api.addEventListener('viewerready', function() {
                    // 1. Nascondi i pallini nativi
                    var pixelTrasparente = 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';
                    api.setAnnotationsTexture(pixelTrasparente);
                    
                    // 2. Avvia la generazione automatica
                    generaEtichetteDaSketchfab();
                });
            },
            error: function error() { console.error('Errore nel caricamento.'); },
            ui_annotations: 1, 
            ui_infos: 0
        });

        // ==========================================
        // LA MAGIA: LETTURA AUTOMATICA DELLE ANNOTAZIONI
        // ==========================================
        function generaEtichetteDaSketchfab() {
            var container = document.getElementById('viewer-container');

            // Richiedi alla API la lista di tutte le annotazioni salvate sul modello
            api.getAnnotationList(function(err, annotations) {
                if (err) {
                    console.error('Errore nella lettura delle annotazioni');
                    return;
                }

                // Cicla attraverso ogni annotazione trovata
                annotations.forEach(function(nota, index) {
                    
                    // Crea un nuovo div HTML (l'etichetta visiva)
                    var divEtichetta = document.createElement('div');
                    divEtichetta.className = 'etichetta-fluttuante';
                    
                    // Usa il "Title" che hai scritto su Sketchfab come testo del tag!
                    divEtichetta.innerText = nota.name; 
                    
                    // Aggiungi il div allo schermo
                    container.appendChild(divEtichetta);

                    // Al clic, apri l'annotazione corrispondente di Sketchfab
                    divEtichetta.addEventListener('click', function() {
                        api.gotoAnnotation(index);
                    });

                    // Salva i dati essenziali nel nostro array per l'inseguimento continuo
                    etichetteGenerate.push({
                        elementoDOM: divEtichetta,
                        coord3D: nota.target // <--- PRENDE IL PIVOT ESATTO IN AUTOMATICO!
                    });
                });

                // Ora che le etichette esistono fisicamente, avvia l'inseguimento della telecamera
                avviaInseguimento();
            });
        }

        // ==========================================
        // INSEGUIMENTO CONTINUO DELLA TELECAMERA
        // ==========================================
        function avviaInseguimento() {
            api.addEventListener('cameramove', function() {
                
                etichetteGenerate.forEach(function(dati) {
                    
                    // Trasforma la coordinata 3D (nota.target) in pixel per lo schermo
                    api.worldToScreen(dati.coord3D, function(err, coord2D) {
                        if (!err && coord2D) {
                            dati.elementoDOM.style.left = coord2D[0] + 'px';
                            dati.elementoDOM.style.top = coord2D[1] + 'px';
                            
                            // Nascondi il tag se va dietro la telecamera
                            if (coord2D[0] < -500 || coord2D[1] < -500) {
                                dati.elementoDOM.style.opacity = '0';
                                dati.elementoDOM.style.pointerEvents = 'none';
                            } else {
                                dati.elementoDOM.style.opacity = '1';
                                dati.elementoDOM.style.pointerEvents = 'auto';
                            }
                        }
                    });
                });
                
            });
        }
    </script>
</body>
</html>
