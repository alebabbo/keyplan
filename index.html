<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Sketchfab - Viste Personalizzate</title>
    
    <script type="text/javascript" src="https://static.sketchfab.com/api/sketchfab-viewer-1.12.1.js"></script>
    
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #2c2c2c; 
            height: 100vh; 
            overflow: hidden;
        }
        
        #viewer-container { 
            position: relative; 
            width: 100%; 
            height: 100%; 
        }
        
        #api-frame { 
            width: 100%; 
            height: 100%; 
            border: none; 
        }

        /* --- STILE DEI BOTTONI --- */
        #menu-viste {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 1000;
        }

        .btn-vista {
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .btn-vista:hover {
            background-color: #1caad9; /* Azzurro Sketchfab */
            border-color: #1caad9;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div id="viewer-container">
        <iframe src="" id="api-frame" allow="autoplay; fullscreen; vr" allowvr allowfullscreen mozallowfullscreen="true" webkitallowfullscreen="true"></iframe>
        
        <div id="menu-viste">
            <button class="btn-vista" id="btn-1">Vista 1</button>
            <button class="btn-vista" id="btn-2">Vista 2</button>
            <button class="btn-vista" id="btn-3">Vista 3</button>
            <button class="btn-vista" id="btn-4">Vista 4</button>
        </div>
    </div>

    <script type="text/javascript">
        var modelUid = '63418af586f14584ab947ca56c9f1a8c'; 
        var iframe = document.getElementById('api-frame');
        var client = new window.Sketchfab('1.12.1', iframe);
        var api = null;

        // ==========================================
        // 1. IMPOSTA QUI LE TUE VISTE CATTURATE
        // ==========================================
        // Sostituisci questi valori con quelli che catturi usando il tasto 'C'
        var viste = {
            vista1: { eye: [5.000, 5.000, 5.000], target: [0.000, 0.000, 0.000] },
            vista2: { eye: [-5.000, 5.000, 5.000], target: [0.000, 0.000, 0.000] },
            vista3: { eye: [0.000, -5.000, 5.000], target: [0.000, 0.000, 0.000] },
            vista4: { eye: [0.000, 0.000, -5.000], target: [0.000, 0.000, 0.000] }
        };

        client.init(modelUid, {
            success: function success(sketchfabApi) {
                api = sketchfabApi;
                api.start();
                
                api.addEventListener('viewerready', function() {
                    console.log('Modello pronto. I bottoni sono attivi!');

                    // ==========================================
                    // 2. COLLEGAMENTO DEI BOTTONI ALLE VISTE
                    // ==========================================
                    // Il numero "1.5" alla fine indica la durata dell'animazione in secondi
                    
                    document.getElementById('btn-1').addEventListener('click', function() {
                        api.setCameraLookAt(viste.vista1.eye, viste.vista1.target, 1.5);
                    });

                    document.getElementById('btn-2').addEventListener('click', function() {
                        api.setCameraLookAt(viste.vista2.eye, viste.vista2.target, 1.5);
                    });

                    document.getElementById('btn-3').addEventListener('click', function() {
                        api.setCameraLookAt(viste.vista3.eye, viste.vista3.target, 1.5);
                    });

                    document.getElementById('btn-4').addEventListener('click', function() {
                        api.setCameraLookAt(viste.vista4.eye, viste.vista4.target, 1.5);
                    });
                });
            },
            error: function error() { console.error('Errore nel caricamento del modello.'); },
            ui_annotations: 1, // Lascia le note native se vuoi usarle, altrimenti metti 0
            ui_infos: 0
        });

        // ==========================================
        // 3. LO STRUMENTO DI CATTURA (Tasto 'C')
        // ==========================================
        window.addEventListener('keydown', function(event) {
            if (event.key === 'c' || event.key === 'C') {
                if (api) {
                    api.getCameraLookAt(function(err, camera) {
                        if (!err) {
                            var codice = '{ eye: [' + camera.position.map(n => n.toFixed(3)).join(', ') + '], target: [' + camera.target.map(n => n.toFixed(3)).join(', ') + '] }';
                            console.log("Copia questa riga per la tua vista:");
                            console.log(codice);
                            alert("Coordinate stampate nella Console (F12)!");
                        }
                    });
                }
            }
        });
    </script>
</body>
</html>
